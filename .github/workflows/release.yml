name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - 'claude/fix-help-button-transcription-hswh8'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.1)'
        required: true
        default: 'v0.2.1'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build installer
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: release/Ask-Margaret-Setup-*.exe
          generate_release_notes: false
          body: |
            ## What's new in ${{ steps.tag.outputs.tag }}

            - Fixed the "I need help" button so transcription no longer fails
              with a "spawn ...\\app.asar\\...\\ffmpeg.exe ENOENT" error.
            - Robust ffmpeg-static resolver tries the unpacked path, then the
              raw path, then `process.resourcesPath`, and verifies the binary
              exists before spawning.
            - Friendlier on-button error labels (no more raw paths leaking).
            - Result window now renders even if the renderer script crashes
              before signaling `resultReady()`.

            **To install:** download `Ask-Margaret-Setup-*.exe` below and double-click it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
