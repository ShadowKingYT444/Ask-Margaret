name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: release/Ask-Margaret-Setup-*.exe
          generate_release_notes: false
          body: |
            ## What's new in ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

            - Conversational voice chatbot in the Result window
            - Smarter analysis with senior-friendly big UI and 4 modes
            - First-run Gemini API key prompt on every install

            **To install:** Download `Ask-Margaret-Setup-*.exe` below and double-click it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
